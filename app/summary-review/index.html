      #summary-fallback[hidden] {

  <body class="summary-review-page summary-image-page">
    <div id="summary-root" hidden></div>

    <main
      id="summary-fallback"
      class="summary-review-frame summary-image-frame"
      aria-label="Review Your Information fallback"
    >
      <img
        class="summary-fallback-image"
        src="./assets/review-your-information-fallback.svg"
        alt="Review Your Information. Your heart rate was higher than expected. Measurements show heart rate 130 bpm, oxygen 98 percent, blood pressure 102 over 68, and temperature 36.5 C. Reported symptoms include palpitations and chest tightness, with no shortness of breath, no dizziness, and no fainting. Please confirm your information with staff."
      >
    </main>

    <script type="module">
      import React from "react";
      import { createRoot } from "react-dom/client";

      const fallback = document.getElementById("summary-fallback");
      const rootElement = document.getElementById("summary-root");
      const fallbackImageSrc = "./assets/review-your-information-fallback.svg";
      const SUMMARY_PAYLOAD_STORAGE_KEY = "nycu_summary_review_payload";
      const SUMMARY_PAYLOAD_HANDOFF_TYPE = "nycu_summary_review_payload";

      function parseSummaryPayload(raw) {
        if (!raw || raw.length > 100000) return null;
        try {
          const parsed = JSON.parse(raw);
          const payload = parsed && parsed.type === SUMMARY_PAYLOAD_HANDOFF_TYPE
            ? parsed.payload
            : parsed;
          return payload && payload.status === "summary" && payload.staff_review_summary
            ? payload
            : null;
        } catch {
          return null;
        }
      }

      function readSummaryPayloadHandoff() {
        const candidates = [];

        try {
          if (window.name) candidates.push(window.name);
        } finally {
          window.name = "";
        }

        try {
          const stored = window.sessionStorage.getItem(SUMMARY_PAYLOAD_STORAGE_KEY);
          if (stored) candidates.push(stored);
          window.sessionStorage.removeItem(SUMMARY_PAYLOAD_STORAGE_KEY);
        } catch {
          // Storage may be unavailable in locked-down kiosk shells.
        }

        for (const candidate of candidates) {
          const payload = parseSummaryPayload(candidate);
          if (payload) return payload;
        }

        return null;
      }

      function sessionKeyFromUrl() {
        try {
          const params = new URLSearchParams(window.location.search);
          const sessionKey = params.get("session_key");
          return sessionKey && /^[A-Za-z0-9_-]{20,160}$/.test(sessionKey) ? sessionKey : null;
        } catch {
          return null;
        }
      }

      async function fetchSummaryPayloadBySessionKey(sessionKey) {
        if (!sessionKey) return null;
        const response = await fetch(`/api/triage-demo/sessions/${encodeURIComponent(sessionKey)}/summary`, {
          cache: "no-store",
          headers: { "Accept": "application/json" }
        });
        if (!response.ok) {
          throw new Error(`Unable to load summary for session_key: ${response.status}`);
        }
        const payload = await response.json();
        return payload && payload.status === "summary" && payload.staff_review_summary ? payload : null;
      }

      async function readSummaryPayload() {
        const handoffPayload = readSummaryPayloadHandoff();
        if (handoffPayload) return handoffPayload;
        return fetchSummaryPayloadBySessionKey(sessionKeyFromUrl());
      }

      async function mountSummaryReview() {
        try {
          if (!window.Babel) {
            throw new Error("Babel runtime compiler is unavailable.");
          }

          const response = await fetch("./SummaryReview.tsx", { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`Unable to load SummaryReview.tsx: ${response.status}`);
          }

          const source = await response.text();
          const compiled = window.Babel.transform(source, {
            filename: "SummaryReview.tsx",
            presets: [
              ["typescript", { allExtensions: true, isTSX: true }],
              ["react", { runtime: "classic" }]
            ],
            sourceType: "module"
          }).code;

          const moduleBlob = new Blob([compiled], { type: "text/javascript" });
          const moduleUrl = URL.createObjectURL(moduleBlob);
          const module = await import(moduleUrl);
          URL.revokeObjectURL(moduleUrl);

          if (!module.default) {
            throw new Error("SummaryReview.tsx did not export a default component.");
          }

          createRoot(rootElement).render(
            React.createElement(module.default, {
              fallbackImageSrc,
              summaryPayload: await readSummaryPayload()
            })
          );

          rootElement.hidden = false;
          fallback.hidden = true;
        } catch (error) {
          console.error("SummaryReview React render failed; showing screenshot fallback.", error);
          rootElement.hidden = true;
          fallback.hidden = false;
        }
      }

      mountSummaryReview();
    </script>
